server:
  port: 8083

spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: INFO
    com.dkghosh.paymentservice: INFO
    org.springframework.kafka: INFO

